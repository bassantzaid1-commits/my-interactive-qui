<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="quiz-app">
    <div class="quiz">
      <div class="quiz-info">
        <div class="category">Category: <span>Html</span></div>
        <div class="count">Questions Count: <span></span></div>
      </div>
      <div class="quiz-area">
        
      </div>
      <div class="answers-area">
       
      </div>
      <button class="submit-button">Submit</button>
      <div class="bullets">
        <div class="spans">
         
        </div>
        
        <div class="countdown">
        

        </div>
      </div>
      <div class="result">
      </div>
      <button class="back-button" style="display:none;">
  Back to Main Menu
</button>
<button class="review-btn" style="display:none;">
  Review Answers
</button>
    </div>
  </div>
<script src="main.js"></script>
</body>

</html>
